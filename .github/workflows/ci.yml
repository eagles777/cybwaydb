name: CI (mock mode, $0)

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # No API keys anywhere in this job — mock mode only, pushes never cost money.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (pinned dev deps)
        run: pip install -e ".[dev]"
      - name: Tests
        run: pytest -q
      - name: Repo controls (secret scan + policy lint)
        run: cybwaydb controls --root .
      - name: End-to-end mock scan + integrity verify
        run: |
          cybwaydb scan --out runs/ci
          cybwaydb verify --run-dir runs/ci
